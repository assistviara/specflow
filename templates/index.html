{% extends "base.html" %}
{% block title %}プロジェクト一覧 - SpecFlow{% endblock %}

{% block content %}
<div class="card">
    <h1>プロジェクト一覧</h1>

    {% if projects %}
    <table>
        <thead>
            <tr>
                <th>プロジェクト名</th>
                <th>状態</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
        {% for project in projects %}
            <tr>
                <td>{{ project.name }}</td>
                <td>{{ project.status }}</td>
                <td>
                    <a class="button" href="{{ url_for('project_detail', project_name=project.name) }}">
                        開く
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="muted">projects フォルダにプロジェクトがありません。</p>
    {% endif %}
</div>
{% endblock %}
